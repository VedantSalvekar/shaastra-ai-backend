services:
  postgres:
    image: postgres:16
    restart: always
    container_name: shaastra_postgres
    environment:
      POSTGRES_USER: shaastra
      POSTGRES_PASSWORD: shaastra_password
      POSTGRES_DB: shaastra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shaastra -d shaastra_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: shaastra_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override .env for Docker networking (postgres = service name above)
      DATABASE_URL: postgresql+psycopg2://shaastra:shaastra_password@postgres:5432/shaastra_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
